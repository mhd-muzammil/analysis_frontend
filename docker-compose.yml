version: "3.8"

services:
  # ── Backend (Django + Daphne) ──
  backend:
    build:
      context: ./analysis_backend_saleem
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./analysis_backend_saleem/.env
    environment:
      - PORT=9000
    ports:
      - "9000:9000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s

  # ── Frontend (Nginx serving React SPA) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: https://analysis.systimus.in/api
        VITE_WS_BASE: wss://analysis.systimus.in
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Redis (Channel Layer + Cache) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
